# Achado ao vivo (M07, demo via sslip.io): em produção o TLS é terminado no Nginx do HOST, que
# faz proxy_pass em HTTP puro pro container do frontend (localhost:8090) — $scheme AQUI DENTRO
# do container sempre valeria "http", mesmo com o browser tendo entrado por https. Isso gerava
# um redirect_uri http:// pro Google (que exige https, rejeitaria o login). Preserva o
# X-Forwarded-Proto que o Nginx do host já manda certo, em vez de recalcular com $scheme; cai
# de volta pra $scheme só quando não há proxy na frente (dev local via Vite, full-up.sh).
map $http_x_forwarded_proto $proxy_x_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Resolver embutido do Docker (127.0.0.11) + proxy_pass via variável: sem isso, o Nginx
    # resolve "backend" uma única vez na inicialização e guarda o IP em cache pro tempo de vida
    # do worker. Como o Coolify sobe um container novo (IP novo) a cada deploy do backend, um
    # redeploy do backend sozinho deixava o front respondendo 502 até o front também ser
    # reiniciado. Com `resolver` + variável, o Nginx reresolve o DNS a cada `valid`.
    # ipv6=off: achado ao vivo (webhook do Mercado Pago, 503 intermitente) — o container do
    # backend tem endereço IPv4 e IPv6 na rede do Coolify, e o resolver às vezes escolhia o
    # IPv6 (fd2b:...), que falhava. Mesma classe de bug do X-Forwarded-Proto (rede dual-stack
    # meio configurada nessa VPS) — força IPv4 só aqui dentro, não precisa do IPv6 interno.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $backend_upstream http://backend:8080;

    # Mesma lógica do proxy do Vite em dev: front e back atrás da mesma origem,
    # sessão por cookie funciona sem drama de CORS/SameSite=None.
    location /api/ {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
    }

    # M07 — login com Google: mesmo raciocínio do /api/ acima. /oauth2/authorization/google
    # (início do fluxo) e /login/oauth2/code/google (callback) são servidos pelo Spring Security.
    location /oauth2/ {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
    }

    location /login/oauth2/ {
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
    }

    # SPA: qualquer rota client-side (React Router) cai no index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
