services:
  db:
    image: postgres:15
    container_name: ${PROJECT_NAME:-sawhub}_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sawhub_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sawhub_pass}
      POSTGRES_DB: ${POSTGRES_DB:-sawhub_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sawhub_user} -d ${POSTGRES_DB:-sawhub_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME:-sawhub}_redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-sawhub_redis_pass}"]
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-sawhub_redis_pass}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Captura SMTP local pra testar de verdade o fluxo de e-mail (esqueci minha senha etc.) sem
  # depender de uma conta real nem de internet — Playwright lê o e-mail recebido via API HTTP
  # (porta 8025) em vez do fallback de log (EMAIL_PERMITIR_FALLBACK_LOG), o que exercita o
  # caminho real de envio (MailConfig/JavaMailSenderImpl), não só o log de conveniência.
  mailpit:
    image: axllent/mailpit
    container_name: ${PROJECT_NAME:-sawhub}_mailpit
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # UI/API HTTP
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: ${PROJECT_NAME:-sawhub}_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@onda.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
