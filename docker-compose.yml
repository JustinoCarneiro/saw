version: '3.8'

services:
  db:
    image: postgres:15
    container_name: ${PROJECT_NAME:-onda_db}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-onda_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-onda_pass}
      POSTGRES_DB: ${POSTGRES_DB:-onda_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: ${PROJECT_NAME:-onda}_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@onda.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
