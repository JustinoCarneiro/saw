spring:
  application:
    name: saw-hub-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${POSTGRES_DB:sawhub_db}
    username: ${POSTGRES_USER:sawhub_user}
    password: ${POSTGRES_PASSWORD:sawhub_pass}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  servlet:
    multipart:
      # Achado (médio) da revisão de segurança do M06: sem isto, o único limite de tamanho do
      # upload de áudio (POST .../ata/audio) era o default implícito do Spring Boot, não um
      # controle desenhado pro caso de uso — um áudio de mentoria de 1h em qualidade razoável
      # fica bem abaixo de 150MB, o teto aqui é generoso mas finito.
      max-file-size: 150MB
      max-request-size: 155MB

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:sawhub_redis_pass}

  session:
    store-type: redis
    timeout: 8h
    redis:
      namespace: sawhub:session
      repository-type: default

server:
  port: ${SERVER_PORT:8080}
  # Atrás do proxy do Coolify o TLS é terminado antes de chegar aqui — sem isto,
  # request.isSecure() sempre reporta false e o cookie de sessão/CSRF nunca ganha o
  # atributo Secure, mesmo em produção (achado M1 da revisão de segurança).
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        name: SAWHUB_SESSION
        http-only: true
        same-site: lax

sawhub:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  # Default FALSE de propósito (achado H1 da revisão de segurança): sem isso, um deploy que
  # esqueça de configurar a env sobe em produção com 4+ contas ADMIN de senha conhecida.
  # Dev/demo local precisa setar SEED_DEMO_DATA=true explicitamente (ver scripts/dev-up.sh).
  seed-demo-data: ${SEED_DEMO_DATA:false}
  bootstrap:
    fundador-nome: ${BOOTSTRAP_FUNDADOR_NOME:Matheus Brayan}
    fundador-email: ${BOOTSTRAP_FUNDADOR_EMAIL:matheus@sawhub.com.br}
    # Sem fallback de propósito (achado H1): a app falha no boot se a env não existir, em vez
    # de silenciosamente criar o Fundador com uma senha conhecida/versionada.
    fundador-senha: ${BOOTSTRAP_FUNDADOR_SENHA}
  # Diferencial de IA (M06 — ata automática). Default vazio de propósito: ao contrário de
  # BOOTSTRAP_FUNDADOR_SENHA, IA é uma feature opcional — sem a chave, o upload de áudio falha
  # com uma mensagem clara (IaIndisponivelException) em vez de derrubar o boot da aplicação.
  ia:
    openai-api-key: ${OPENAI_API_KEY:}
    anthropic-api-key: ${ANTHROPIC_API_KEY:}
  audio:
    # Volume Docker em produção (ver ROADMAP.md M06) — precisa entrar no backup, não é só um
    # diretório solto. Default relativo pra dev local funcionar sem configurar nada.
    storage-dir: ${AUDIO_STORAGE_DIR:./data/audios}

logging:
  level:
    com.sawhub.hub: DEBUG
