spring:
  application:
    name: saw-hub-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${POSTGRES_DB:sawhub_db}
    username: ${POSTGRES_USER:sawhub_user}
    password: ${POSTGRES_PASSWORD:sawhub_pass}
    hikari:
      # Pass transversal de pgcrypto (Fase 5): as colunas sensíveis (ver entidades Lead/Mentorado/
      # Colaborador) são lidas/escritas via @ColumnTransformer chamando pgp_sym_decrypt/encrypt
      # com a chave vinda de uma GUC de sessão, não de um literal na anotação (isso vazaria a
      # chave pro bytecode/log de SQL formatado). SET roda uma vez por conexão física (pool do
      # Hikari), não por query. Sem default de propósito (mesmo achado H1 do BOOTSTRAP_FUNDADOR_
      # SENHA) — sem a env, a aplicação falha no boot em vez de conectar sem conseguir decriptar
      # nada.
      connection-init-sql: "SET app.encryption_key = '${PGCRYPTO_KEY}'"

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    # A migração V19 precisa da mesma chave pra reencriptar dados já existentes nas colunas
    # sensíveis (não é só mudar o tipo da coluna) — mesma env var do connection-init-sql acima,
    # nunca duas fontes de verdade pra uma chave de criptografia.
    placeholders:
      pgcryptoKey: ${PGCRYPTO_KEY}

  servlet:
    multipart:
      # Achado (médio) da revisão de segurança do M06: sem isto, o único limite de tamanho do
      # upload de áudio (POST .../ata/audio) era o default implícito do Spring Boot, não um
      # controle desenhado pro caso de uso — um áudio de mentoria de 1h em qualidade razoável
      # fica bem abaixo de 150MB, o teto aqui é generoso mas finito.
      max-file-size: 150MB
      max-request-size: 155MB

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:sawhub_redis_pass}
      # database (índice lógico do Redis, não precisa de container separado) isola sessão e
      # chaves de rate-limiter do ambiente de E2E (scripts/e2e-up.sh usa REDIS_DATABASE=1) do
      # ambiente de dev interativo (índice 0) — sem isso, rodar a suíte enquanto navega o
      # dev manualmente podia derrubar rate-limit ou sessão um do outro.
      database: ${REDIS_DATABASE:0}

  session:
    store-type: redis
    timeout: 8h
    redis:
      namespace: sawhub:session
      repository-type: default

server:
  port: ${SERVER_PORT:8080}
  # Atrás do proxy do Coolify o TLS é terminado antes de chegar aqui — sem isto,
  # request.isSecure() sempre reporta false e o cookie de sessão/CSRF nunca ganha o
  # atributo Secure, mesmo em produção (achado M1 da revisão de segurança).
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        name: SAWHUB_SESSION
        http-only: true
        same-site: lax

sawhub:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  # Default FALSE de propósito (achado H1 da revisão de segurança): sem isso, um deploy que
  # esqueça de configurar a env sobe em produção com 4+ contas ADMIN de senha conhecida.
  # Dev/demo local precisa setar SEED_DEMO_DATA=true explicitamente (ver scripts/dev-up.sh).
  seed-demo-data: ${SEED_DEMO_DATA:false}
  bootstrap:
    fundador-nome: ${BOOTSTRAP_FUNDADOR_NOME:Matheus Brayan}
    fundador-email: ${BOOTSTRAP_FUNDADOR_EMAIL:matheus@sawhub.com.br}
    # Sem fallback de propósito (achado H1): a app falha no boot se a env não existir, em vez
    # de silenciosamente criar o Fundador com uma senha conhecida/versionada.
    fundador-senha: ${BOOTSTRAP_FUNDADOR_SENHA}
  # M07 — login com Google. Achado (E2E de Google OAuth com stub de IdP): faltava este elo —
  # GOOGLE_CLIENT_ID/SECRET (nomes documentados no ROADMAP.md M07) nunca chegavam até
  # GoogleOAuthProperties sem esta ponte, então configurá-las em produção não tinha efeito
  # nenhum (OAuth ficava sempre "desabilitado").
  # As URIs de authorization/token/userinfo (e as baseUrl de IA/Mercado Pago logo abaixo) NÃO
  # têm bridge de env var aqui de propósito (achado Alto do revisor-seguranca): se existisse um
  # nome de env var que as sobrescrevesse em qualquer ambiente, uma env mal configurada em
  # produção (ex.: copiar o bloco do e2e-up.sh por engano) redirecionaria o authorization code
  # flow inteiro pra um IdP malicioso — a checagem de email_verified em GoogleOAuth2UserService
  # não protege nada nesse cenário, porque quem responde o /userinfo forjado é o próprio
  # atacante. Os defaults (endpoint real do Google) ficam só no @Value de GoogleOAuthProperties;
  # o override pro stub local do E2E mora em application-e2e.yml, que só carrega com
  # SPRING_PROFILES_ACTIVE=e2e (nunca ativo em produção, ver scripts/e2e-up.sh).
  oauth2:
    google-client-id: ${GOOGLE_CLIENT_ID:}
    google-client-secret: ${GOOGLE_CLIENT_SECRET:}
  # Diferencial de IA (M06 — ata automática). Default vazio de propósito: ao contrário de
  # BOOTSTRAP_FUNDADOR_SENHA, IA é uma feature opcional — sem a chave, o upload de áudio falha
  # com uma mensagem clara (IaIndisponivelException) em vez de derrubar o boot da aplicação.
  # baseUrl não tem bridge aqui pelo mesmo motivo do oauth2 acima — uma baseUrl apontada pra
  # fora vazaria a própria API key real (enviada como Authorization Bearer) pro host de destino.
  ia:
    openai-api-key: ${OPENAI_API_KEY:}
    anthropic-api-key: ${ANTHROPIC_API_KEY:}
  audio:
    # Volume Docker em produção (ver ROADMAP.md M06) — precisa entrar no backup, não é só um
    # diretório solto. Default relativo pra dev local funcionar sem configurar nada.
    storage-dir: ${AUDIO_STORAGE_DIR:./data/audios}
  # E8 — checkout Loja SAW (Mercado Pago, M14). Default vazio de propósito, mesmo raciocínio do
  # bloco `ia` acima: sem a credencial, o checkout falha com PagamentoIndisponivelException clara
  # em vez de tentar uma chamada fadada a 401. frontend-base-url/backend-base-url alimentam os
  # back_urls/notification_url da preferência do Mercado Pago — em dev local o webhook nunca é
  # alcançável de fora (localhost), verificado só até a borda (mesmo padrão do pipeline de IA).
  # mercadopago-base-url sem bridge aqui pelo mesmo motivo do oauth2/ia acima (vazamento do
  # access token real pro host de destino se apontada errado).
  pagamento:
    mercadopago-access-token: ${MERCADOPAGO_ACCESS_TOKEN:}
    mercadopago-webhook-secret: ${MERCADOPAGO_WEBHOOK_SECRET:}
    frontend-base-url: ${LOJA_FRONTEND_BASE_URL:http://localhost:5173}
    backend-base-url: ${LOJA_BACKEND_BASE_URL:http://localhost:8080}
  # H1.4 (M18) — recuperação de senha. Default vazio de propósito, mesmo raciocínio dos blocos
  # `ia`/`pagamento` acima: sem SMTP configurado, o e-mail não é enviado de verdade.
  email:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    remetente: ${MAIL_REMETENTE:no-reply@sawhub.com.br}
    frontend-base-url: ${EMAIL_FRONTEND_BASE_URL:http://localhost:5173}
    # Achado da revisão final de segurança (Fase 5): sem isto, um deploy que esqueça de configurar
    # SMTP logava o token de redefinição de senha (credencial de account-takeover) em texto puro
    # em vez de falhar — default FALSE de propósito (fail-closed, mesmo espírito do achado H1 do
    # SEED_DEMO_DATA). Dev/E2E precisam setar EMAIL_PERMITIR_FALLBACK_LOG=true explicitamente pra
    # ver o link no log sem precisar configurar SMTP real (ver scripts/dev-up.sh, scripts/e2e-up.sh).
    permitir-fallback-log: ${EMAIL_PERMITIR_FALLBACK_LOG:false}

logging:
  level:
    com.sawhub.hub: DEBUG
