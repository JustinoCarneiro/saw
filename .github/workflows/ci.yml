name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  # Mesmos valores "nunca usar em produção" de scripts/dev-up.sh / scripts/e2e-up.sh — em CI só
  # precisam ser consistentes entre si (fail-closed: sem eles, o boot falha, ver application.yml).
  BOOTSTRAP_FUNDADOR_SENHA: trocar-no-primeiro-login
  PGCRYPTO_KEY: chave-de-ci-nunca-usar-em-producao

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: sawhub_user
          POSTGRES_PASSWORD: sawhub_pass
          POSTGRES_DB: sawhub_db
        ports: [ "5432:5432" ]
        options: >-
          --health-cmd "pg_isready -U sawhub_user -d sawhub_db"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: [ "6379:6379" ]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: mvn test (390 testes — unitários + @DataJpaTest contra Postgres real)
        working-directory: backend
        env:
          # Serviço redis:7-alpine não roda com --requirepass em CI (services: não permite
          # override de CMD) — senha vazia aqui bate com o container sem auth.
          REDIS_PASSWORD: ""
        run: ./mvnw -B test

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        working-directory: frontend
        run: npm ci

      - name: npm run build (tsc -b + vite build — pega erro de tipo que tsc --noEmit bare não pega)
        working-directory: frontend
        run: npm run build

  docker-smoke-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # SEED_DEMO_DATA/BOOTSTRAP_FUNDADOR_SENHA/PGCRYPTO_KEY já vêm hardcoded como valores literais
      # dentro do próprio docker-compose.full.yml (não são ${VAR} lidos do shell) — nada a exportar
      # aqui, ao contrário do job backend-test acima que roda o Spring Boot nativo.
      - name: Build e subir a stack completa (mesmo docker-compose.full.yml do smoke test local)
        run: docker compose -f docker-compose.yml -f docker-compose.full.yml up -d --build

      - name: Aguardar backend (:8080) e frontend (:8081)
        run: |
          timeout 120 bash -c 'until curl -sf -o /dev/null http://localhost:8080/api/v1/auth/me; do sleep 2; done' \
            || { docker compose -f docker-compose.yml -f docker-compose.full.yml logs backend; exit 1; }
          timeout 60 bash -c 'until curl -sf -o /dev/null http://localhost:8081/; do sleep 1; done' \
            || { docker compose -f docker-compose.yml -f docker-compose.full.yml logs frontend; exit 1; }

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci + instalar browser do Playwright
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Suite E2E completa (Playwright) contra a stack containerizada
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:8081
        run: npm run test:e2e

      - name: Upload de screenshots/traces do Playwright em caso de falha
        # playwright.config.ts usa reporter 'list' (sem html) — screenshot/trace só existem em
        # test-results/ quando algum teste falha (screenshot: only-on-failure, trace:
        # retain-on-failure), ver frontend/playwright.config.ts.
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/test-results/
          retention-days: 7

      - name: Derrubar containers
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.full.yml down -v
